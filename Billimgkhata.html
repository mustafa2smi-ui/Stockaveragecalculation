<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shop Ledger Pro</title>
    <style>
        :root { 
            --green: #C8E6C9; --pink: #E91E63; --shadow: 0 4px 15px rgba(0,0,0,0.1); 
            --bg: #f0f2f5; --card-bg: #ffffff; --text: #333333; --border: #dddddd;
        }
        [data-theme="dark"] {
            --green: #2e7d32; --pink: #ff4081; --shadow: 0 4px 15px rgba(0,0,0,0.5);
            --bg: #121212; --card-bg: #1e1e1e; --text: #ffffff; --border: #444444;
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; }
        
        /* Header Styling */
        .header { background: var(--green); padding: 20px; text-align: center; border-bottom: 3px solid #a5d6a7; box-shadow: var(--shadow); position: relative; }
        .header h1 { color: var(--pink); margin: 0; font-size: 26px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        /* Dark Mode Toggle Switch */
        .theme-switch { position: absolute; right: 15px; top: 25px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: bold; color: var(--text); }
        
        /* Navigation Buttons */
        .nav-container { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .nav-btn { padding: 12px 35px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: var(--shadow); font-size: 16px; }
        .btn-entry { background: #ffeb3b; color: #333; }
        .btn-view { background: #03a9f4; color: white; }
        .nav-btn:active { transform: scale(0.95); box-shadow: 0 0 10px var(--pink); }

        .container { max-width: 800px; margin: auto; padding: 15px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 20px; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); box-sizing: border-box; background: var(--card-bg); color: var(--text); font-size: 16px; }
        
        /* Party List Styling */
        .party-item { display: flex; justify-content: space-between; padding: 15px; background: var(--card-bg); margin-bottom: 10px; border-radius: 10px; cursor: pointer; border-left: 5px solid var(--pink); transition: 0.2s; border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .party-item:hover { background: rgba(233, 30, 99, 0.05); }
        .bal-text { color: #ff1744; font-weight: bold; font-size: 18px; }

        /* Detail Sections */
        .section-title { background: var(--green); color: var(--text); padding: 10px; border-radius: 5px; margin-top: 20px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: var(--card-bg); font-size: 14px; color: var(--text); }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        th { background: rgba(0,0,0,0.05); }

        .back-btn { background: var(--pink); color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; float: right; margin-bottom: 10px; font-weight: bold; }
        .img-grid { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .img-card { min-width: 120px; text-align: center; }
        .img-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 2px solid var(--border); }
        
        #viewSection, #detailSection { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>My Shop Ledgers account</h1>
    <div class="theme-switch" onclick="toggleTheme()">
        <span id="themeLabel">🌙 Dark</span>
    </div>
</div>

<div class="nav-container">
    <button class="nav-btn btn-entry" onclick="showMode('entry')">Entry</button>
    <button class="nav-btn btn-view" onclick="showMode('view')">View</button>
</div>

<div class="container">
    <div id="entrySection" class="card">
        <h3>New Bill Entry</h3>
        <label>Date:</label>
        <input type="date" id="billDate">
        <input type="text" id="partyName" placeholder="Party Name">
        <input type="text" id="billNo" placeholder="Bill Number">
        <div style="display:flex; gap:10px;">
            <input type="number" id="billAmt" placeholder="Bill Amount" oninput="calc()">
            <select id="type"><option>Credit</option><option>Cash</option></select>
        </div>
        <div style="display:flex; gap:10px;">
            <input type="number" id="deposit" placeholder="Deposit (Jama)" oninput="calc()">
            <input type="number" id="balance" placeholder="Balance" readonly>
        </div>
        <label>Upload/Camera (Auto Compressed):</label>
        <input type="file" id="billImg" accept="image/*" capture="environment">
        
        <h4 style="border-bottom: 2px solid var(--green); margin-top:20px; padding-bottom:5px;">Items Entry</h4>
        <div id="itemInputs">
            <div style="display:flex; gap:5px; margin-bottom:5px;">
                <input type="text" placeholder="Item" class="i-name">
                <input type="number" placeholder="Qty" class="i-qty" style="width:70px">
                <input type="number" placeholder="Rate" class="i-rate" style="width:80px">
            </div>
        </div>
        <button onclick="addItemRow()" style="background:rgba(0,0,0,0.1); color:var(--text); border:none; padding:8px; cursor:pointer; border-radius:5px; font-weight:bold;">+ Add Row</button>
        <button id="saveBtn" onclick="saveData()" style="background:var(--pink); color:white; border:none; padding:15px; width:100%; border-radius:10px; margin-top:20px; font-weight:bold; cursor:pointer;">SAVE RECORD</button>
    </div>

    <div id="viewSection">
        <div id="partyList" class="card">Loading parties...</div>
    </div>

    <div id="detailSection" class="card">
        <div class="back-btn" onclick="showMode('view')"> > Back </div>
        <h2 id="detPartyName" style="color:var(--pink); margin-top:0;">Party Name</h2>
        
        <div class="section-title">Section 1: Ledger Details</div>
        <div style="overflow-x:auto">
            <table id="ledTable">
                <thead><tr><th>Date</th><th>Bill No</th><th>Deposit</th><th>Amount</th><th>Type</th><th>Bal</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="section-title">Section 2: Bill Images</div>
        <div class="img-grid" id="imgGrid"></div>

        <div class="section-title">Section 3: Items Matrix</div>
        <div style="overflow-x:auto">
            <table id="matrixTable">
                <thead><tr id="matrixHead"><th>Items</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Google Apps Script Deploy URL (Agar khali chhodenge toh automatic Local Storage use hoga)
    const SCRIPT_URL = ""; 

    // Page Load hote hi Date set karein aur Theme check karein
    window.onload = function() {
        let today = new Date().toISOString().split('T')[0];
        document.getElementById('billDate').value = today;
        
        // Load Saved Theme
        if(localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeLabel').innerText = "☀️ Light";
        }
    };

    function toggleTheme() {
        if(document.documentElement.getAttribute('data-theme') === 'dark') {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            document.getElementById('themeLabel').innerText = "🌙 Dark";
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            document.getElementById('themeLabel').innerText = "☀️ Light";
        }
    }

    function showMode(mode) {
        document.getElementById('entrySection').style.display = mode == 'entry' ? 'block' : 'none';
        document.getElementById('viewSection').style.display = mode == 'view' ? 'block' : 'none';
        document.getElementById('detailSection').style.display = 'none';
        if(mode == 'view') loadParties();
    }

    function addItemRow() {
        let div = document.createElement('div');
        div.style = "display:flex; gap:5px; margin-bottom:5px;";
        div.innerHTML = `<input type="text" placeholder="Item" class="i-name">
                         <input type="number" placeholder="Qty" class="i-qty" style="width:70px">
                         <input type="number" placeholder="Rate" class="i-rate" style="width:80px">`;
        document.getElementById('itemInputs').appendChild(div);
    }

    function calc() {
        let a = parseFloat(document.getElementById('billAmt').value) || 0;
        let d = parseFloat(document.getElementById('deposit').value) || 0;
        document.getElementById('balance').value = a - d;
    }

    // Image ko compress karne ka function (Max width 800px aur 70% quality)
    function compressImage(file) {
        return new Promise((resolve) => {
            let reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                let img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    let canvas = document.createElement('canvas');
                    let max_width = 800;
                    let scale = max_width / img.width;
                    if(img.width > max_width) {
                        canvas.width = max_width;
                        canvas.height = img.height * scale;
                    } else {
                        canvas.width = img.width;
                        canvas.height = img.height;
                    }
                    let ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    let dataUrl = canvas.toDataURL('image/jpeg', 0.7); // 0.7 means 70% quality (KB bohot kam ho jayega)
                    resolve(dataUrl);
                }
            }
        });
    }

    async function saveData() {
        const btn = document.getElementById('saveBtn');
        btn.innerText = "Saving..."; btn.disabled = true;

        let items = [];
        document.querySelectorAll('#itemInputs > div').forEach(row => {
            if(row.children[0].value) {
                items.push({name: row.children[0].value, qty: row.children[1].value, rate: row.children[2].value});
            }
        });

        let file = document.getElementById('billImg').files[0];
        let base64 = "";
        if(file) {
            base64 = await compressImage(file); // Compression Triggered
        }

        let payload = {
            date: document.getElementById('billDate').value,
            partyName: document.getElementById('partyName').value,
            billNo: document.getElementById('billNo').value,
            billAmt: document.getElementById('billAmt').value,
            type: document.getElementById('type').value,
            deposit: document.getElementById('deposit').value,
            balance: document.getElementById('balance').value,
            imageByte: base64,
            items: items
        };

        // AGAR SCRIPT_URL SETUP NAHI HAI -> SAVE TO LOCAL STORAGE (FOR DEMO CHECK)
        if(!SCRIPT_URL || SCRIPT_URL === "YOUR_WEB_APP_URL") {
            let localData = JSON.parse(localStorage.getItem('shop_ledger_data')) || [];
            localData.push(payload);
            localStorage.setItem('shop_ledger_data', JSON.stringify(localData));
            
            alert("Demo Mode: Data saved to Local Storage successfully!");
            resetForm();
            return;
        }

        // AGAR SCRIPT_URL HAI -> SEND TO GOOGLE SHEET & DRIVE WITH PROPER ERROR HANDLING
        fetch(SCRIPT_URL, {method: 'POST', body: JSON.stringify(payload)})
        .then(res => {
            if (!res.ok) throw new Error('Network response was not ok');
            return res.json();
        })
        .then(data => {
            if(data.status === "SUCCESS") {
                alert("Cloud Mode: Successfully Saved to Google Sheet & Drive!");
                resetForm();
            } else {
                alert("Failed: " + data.message);
                btn.innerText = "SAVE RECORD"; btn.disabled = false;
            }
        })
        .catch(err => {
            alert("Error: Cloud setup galat hai ya net band hai! (Check Console)");
            console.error(err);
            btn.innerText = "SAVE RECORD"; btn.disabled = false;
        });
    }

    function resetForm() {
        document.getElementById('partyName').value = "";
        document.getElementById('billNo').value = "";
        document.getElementById('billAmt').value = "";
        document.getElementById('deposit').value = "";
        document.getElementById('balance').value = "";
        document.getElementById('billImg').value = "";
        document.getElementById('itemInputs').innerHTML = `
            <div style="display:flex; gap:5px; margin-bottom:5px;">
                <input type="text" placeholder="Item" class="i-name">
                <input type="number" placeholder="Qty" class="i-qty" style="width:70px">
                <input type="number" placeholder="Rate" class="i-rate" style="width:80px">
            </div>`;
        document.getElementById('saveBtn').innerText = "SAVE RECORD";
        document.getElementById('saveBtn').disabled = false;
        let today = new Date().toISOString().split('T')[0];
        document.getElementById('billDate').value = today;
    }

    function loadParties() {
        // Agar SCRIPT_URL nahi hai toh Local Storage ka data view karein
        if(!SCRIPT_URL || SCRIPT_URL === "YOUR_WEB_APP_URL") {
            let localData = JSON.parse(localStorage.getItem('shop_ledger_data')) || [];
            let summary = {};
            localData.forEach(r => {
                summary[r.partyName] = r.balance; // Latest balance mapping
            });
            renderPartyList(summary);
            return;
        }

        // Cloud Mode Fetch
        fetch(SCRIPT_URL + "?action=getSummary")
        .then(res => res.json())
        .then(data => renderPartyList(data))
        .catch(() => document.getElementById('partyList').innerHTML = "Cloud fetch failed. SCRIPT_URL check karein.");
    }

    function renderPartyList(data) {
        let html = "";
        for(let p in data) {
            if(p) {
                html += `<div class="party-item" onclick="loadDetails('${p}')">
                            <span>${p}</span>
                            <span class="bal-text">₹ ${data[p]}</span>
                         </div>`;
            }
        }
        document.getElementById('partyList').innerHTML = html || "No records found. Pehle Data Entry karke save karein.";
    }

    function loadDetails(party) {
        document.getElementById('viewSection').style.display = 'none';
        document.getElementById('detailSection').style.display = 'block';
        document.getElementById('detPartyName').innerText = party;

        if(!SCRIPT_URL || SCRIPT_URL === "YOUR_WEB_APP_URL") {
            // Local Storage details render logic
            let localData = JSON.parse(localStorage.getItem('shop_ledger_data')) || [];
            let partyKhata = localData.filter(r => r.partyName === party);
            
            // Format to look like Sheet Row structure for compatibility
            let khataRows = partyKhata.map(r => [r.date, r.partyName, r.billAmt, r.type, r.deposit, r.balance, r.imageByte, r.billNo]);
            let itemRows = [];
            partyKhata.forEach(r => {
                r.items.forEach(it => {
                    itemRows.push([r.date, r.partyName, it.name, it.qty, it.rate]);
                });
            });
            renderDetailsTables({khata: khataRows, items: itemRows});
            return;
        }

        // Cloud Mode Fetch Details
        fetch(SCRIPT_URL + `?action=getDetails&party=${encodeURIComponent(party)}`)
        .then(res => res.json())
        .then(data => renderDetailsTables(data));
    }

    function renderDetailsTables(data) {
        // Section 1: Ledger
        let lHtml = "";
        data.khata.forEach(r => {
            lHtml += `<tr><td>${r[0]}</td><td>${r[7] || '-'}</td><td>₹ ${r[4]}</td><td>₹ ${r[2]}</td><td>${r[3]}</td><td>₹ ${r[5]}</td></tr>`;
        });
        document.querySelector("#ledTable tbody").innerHTML = lHtml;

        // Section 2: Images
        let iHtml = "";
        data.khata.forEach(r => {
            if(r[6]) iHtml += `<div class="img-card"><img src="${r[6]}"><br><small>${r[0]}</small></div>`;
        });
        document.getElementById('imgGrid').innerHTML = iHtml || "<p style='padding:10px;'>No Image Uploaded</p>";

        // Section 3: Items Matrix
        let dates = [...new Set(data.items.map(i => i[0]))];
        let head = "<th>Items</th>" + dates.map(d => `<th>${d}</th>`).join('');
        document.getElementById('matrixHead').innerHTML = head;

        let itemMap = {};
        data.items.forEach(i => {
            if(!itemMap[i[2]]) itemMap[i[2]] = {};
            itemMap[i[2]][i[0]] = `${i[3]}Q ${i[4]}R`;
        });

        let mBody = "";
        for(let it in itemMap) {
            mBody += `<tr><td>${it}</td>`;
            dates.forEach(d => { mBody += `<td>${itemMap[it][d] || '-'}</td>`; });
            mBody += `</tr>`;
        }
        document.querySelector("#matrixTable tbody").innerHTML = mBody;
    }
</script>
</body>
</html>
