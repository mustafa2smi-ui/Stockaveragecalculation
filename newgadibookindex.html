<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalBusiness Hub - Digital Directory</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ========== PREMIUM WHEELRENT-STYLE LISTING CARD ========== */
        .premium-listing-card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15), inset 0 1px 1px rgba(255,255,255,0.8);
            border: 3px solid #6F4E37;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 🔥 GLOW RED BORDER ON HOVER */
        .premium-listing-card:hover {
            border-color: #ef4444;
            box-shadow: 0 0 25px 5px rgba(239, 68, 68, 0.5), 0 0 50px 10px rgba(239, 68, 68, 0.25), 0 25px 50px -12px rgba(0,0,0,0.25);
            transform: translateY(-4px);
        }
        
        /* Card Background (Vehicle/Business Photo) */
        .premium-card-bg {
            height: 150px;
            background-size: cover;
            background-position: center;
            position: relative;
            background-color: #6F4E37;
        }
        
        /* Gradient overlay on background for text readability */
        .premium-card-bg-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent 60%);
            z-index: 1;
        }
        
        /* Category Badge */
        .premium-category-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #ff6b35, #ef4444);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.35rem 0.9rem;
            border-radius: 2rem;
            z-index: 5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }
        
        /* Offer Badges */
        .premium-offer-badges {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 5;
        }
        .premium-offer-badge {
            background: #fbbf24;
            color: #1e293b;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            white-space: nowrap;
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Owner Circular Photo */
        .premium-owner-pic {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid white;
            background-size: cover;
            background-position: center;
            position: absolute;
            bottom: -35px;
            left: 18px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background-color: #6F4E37;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            z-index: 10;
        }
        
        /* Card Content */
        .premium-card-content {
            padding: 2.8rem 1.2rem 1.2rem;
        }
        .premium-owner-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #1e293b;
            margin-bottom: 0.2rem;
        }
        .premium-location {
            color: #64748b;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .premium-tagline {
            font-size: 0.8rem;
            color: #475569;
            font-style: italic;
            background: #fef3c7;
            padding: 0.6rem 0.8rem;
            border-radius: 1rem;
            margin-top: 0.5rem;
            border: 1px solid #fde68a;
        }
        .premium-action-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 0.7rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white;
            box-shadow: 0 8px 20px -8px #3b82f6;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .premium-action-btn:hover {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            box-shadow: 0 12px 25px -8px #1e40af;
            transform: translateY(-2px);
        }
        
        /* Filter Pills */
        .pill-tab {
            padding: 0.45rem 1.2rem;
            border-radius: 3rem;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            font-weight: 600;
            color: #1e3b5a;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,240,0.8);
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .pill-tab.active {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white;
            box-shadow: 0 12px 20px -6px #3b82f6;
            border-color: #fbbf24;
        }
        
        /* Location Dot */
        .location-dot {
            color: #f59e0b;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 text-gray-800 font-sans pb-10 min-h-screen">

    <!-- HEADER -->
    <header class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white px-4 py-3 sticky top-0 z-50 shadow-lg flex justify-between items-center backdrop-blur-sm">
        <h1 onclick="location.reload()" class="text-xl font-black tracking-wide cursor-pointer flex items-center gap-2">
            <span class="bg-yellow-400 text-blue-900 w-8 h-8 rounded-full flex items-center justify-center text-sm">📍</span>LocalHub
        </h1>
        <button onclick="window.open('newgadibookowner.html', '_blank')" class="bg-yellow-400 hover:bg-yellow-300 text-slate-950 font-bold px-4 py-2 rounded-full text-xs shadow-lg transition-all duration-200 hover:shadow-xl">
            <i class="fa-solid fa-plus-circle mr-1"></i> Make My Card
        </button>
    </header>

    <!-- SEARCH BAR -->
    <div class="bg-gradient-to-b from-blue-700 to-indigo-800 text-white px-4 pb-6 rounded-b-3xl shadow-xl pt-2 max-w-md mx-auto">
        <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-blue-300"></i>
            <input type="text" id="search-input" onkeyup="searchFilter()" placeholder="Search Plumber, Travels, Shop, Village..." class="w-full bg-white/95 backdrop-blur-sm text-gray-900 pl-11 pr-4 py-3 rounded-2xl shadow-inner focus:outline-none focus:ring-2 focus:ring-yellow-400 text-sm font-medium">
        </div>
    </div>

    <!-- FILTER TABS -->
    <section class="max-w-md mx-auto mt-5 px-4 space-y-3">
        <div>
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-wider mb-1.5"><i class="fa-solid fa-layer-group text-blue-600 mr-1"></i> 1. Profession</p>
            <div class="flex gap-1.5 overflow-x-auto no-scrollbar py-1" id="tab-category-box"></div>
        </div>
        <div>
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-wider mb-1.5"><i class="fa-solid fa-map text-blue-600 mr-1"></i> 2. State</p>
            <div class="flex gap-1.5 overflow-x-auto no-scrollbar py-1" id="tab-state-box"></div>
        </div>
        <div>
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-wider mb-1.5"><i class="fa-solid fa-location-crosshairs text-blue-600 mr-1"></i> 3. District</p>
            <div class="flex gap-1.5 overflow-x-auto no-scrollbar py-1" id="tab-district-box"></div>
        </div>
        <div>
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-wider mb-1.5"><i class="fa-solid fa-map-location-dot text-blue-600 mr-1"></i> 4. Village/City</p>
            <div class="flex gap-1.5 overflow-x-auto no-scrollbar py-1" id="tab-village-box"></div>
        </div>

        <hr class="border-gray-200/60 my-4">

        <!-- LISTINGS GRID -->
        <div class="grid grid-cols-1 gap-5 pt-1" id="directory-listings"></div>
    </section>

    <script>
        // =========================================================================
        // 📥 INDEX DATABASE ARRAY (Aapka original data - unchanged)
        // =========================================================================
        const activeDirectoryDatabase = [
            {
                slug: "suresh_travels", 
                name: "Suresh Travels",
                category: "Wedding Car",
                state: "Chhattisgarh",
                district: "Dantewada",
                village: "Mailawada",
                colony: "Kalar Para",
                shortTagline: "Shadi aur emergency ke liye Scorpio aur Bolero available hai.",
                image64: "",
                ownerPhoto: ""
            },
            {
                slug: "mustafa_plumber",
                name: "Mustafa Plumbing Works",
                category: "Plumber",
                state: "Chhattisgarh",
                district: "Dantewada",
                village: "Geedam",
                colony: "Talla Para",
                shortTagline: "Ghar ki nayi pipe fitting aur bathroom nal repair ka kaam.",
                image64: "",
                ownerPhoto: ""
            },
            {
                slug: "demogmilcode",
                name: "Hj",
                category: "Wedding Car",
                phone: "0989328301",
                state: "Chhattisgarh",
                district: "Dantewad",
                village: "Mailawada",
                colony: "Kalar Para",
                shortTagline: "Fast sil ke denge",
                description: "Gh",
                image64: "",
                ownerPhoto: ""
            }
        ];

        let selCat = 'All', selState = 'All', selDist = 'All', selVill = 'All';

        function renderFilterHubTabs() {
            let cats = ['All'], states = ['All'], dists = ['All'], vills = ['All'];
            
            activeDirectoryDatabase.forEach(b => {
                if(!cats.includes(b.category)) cats.push(b.category);
                if(!states.includes(b.state)) states.push(b.state);
                if(!dists.includes(b.district)) dists.push(b.district);
                if(!vills.includes(b.village)) vills.push(b.village);
            });

            document.getElementById('tab-category-box').innerHTML = cats.map(c => `<button onclick="selCat='${c}'; renderFilterHubTabs(); renderCards();" class="pill-tab ${c===selCat?'active':''}">${c}</button>`).join('');
            document.getElementById('tab-state-box').innerHTML = states.map(s => `<button onclick="selState='${s}'; renderFilterHubTabs(); renderCards();" class="pill-tab ${s===selState?'active':''}">${s}</button>`).join('');
            document.getElementById('tab-district-box').innerHTML = dists.map(d => `<button onclick="selDist='${d}'; renderFilterHubTabs(); renderCards();" class="pill-tab ${d===selDist?'active':''}">${d}</button>`).join('');
            document.getElementById('tab-village-box').innerHTML = vills.map(v => `<button onclick="selVill='${v}'; renderFilterHubTabs(); renderCards();" class="pill-tab ${v===selVill?'active':''}">${v}</button>`).join('');
        }

        function renderCards() {
            const container = document.getElementById('directory-listings');
            container.innerHTML = '';

            let filtered = activeDirectoryDatabase.filter(b => {
                if(selCat !== 'All' && b.category !== selCat) return false;
                if(selState !== 'All' && b.state !== selState) return false;
                if(selDist !== 'All' && b.district !== selDist) return false;
                if(selVill !== 'All' && b.village !== selVill) return false;
                return true;
            });

            if(filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm">✨ No cards found in this filter selection.</div>`;
                return;
            }

            filtered.forEach(card => {
                const bgImage = card.image64 || 'https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=400';
                const ownerPic = card.ownerPhoto || '';
                const initial = card.name ? card.name.charAt(0).toUpperCase() : '?';
                
                container.innerHTML += `
                    <div class="premium-listing-card">
                        <!-- Card Background Photo -->
                        <div class="premium-card-bg" style="background-image: url('${bgImage}');">
                            <div class="premium-card-bg-overlay"></div>
                            
                            <!-- Category Badge (top-right) -->
                            <span class="premium-category-badge">${card.category}</span>
                            
                            <!-- Offer Badges (top-left) - agar offers hain to -->
                            ${card.offers && card.offers.length > 0 ? `
                            <div class="premium-offer-badges">
                                ${card.offers.map(off => `<span class="premium-offer-badge">🔥 ${off.substring(0,18)}</span>`).join('')}
                            </div>` : ''}
                            
                            <!-- Owner Circular Photo -->
                            <div class="premium-owner-pic" style="background-image: url('${ownerPic}');">
                                ${!ownerPic ? initial : ''}
                            </div>
                        </div>
                        
                        <!-- Card Content -->
                        <div class="premium-card-content">
                            <div class="premium-owner-name">${card.name}</div>
                            <div class="premium-location">
                                <span class="location-dot">📍</span> ${card.colony || 'N/A'}, ${card.village || 'N/A'}
                            </div>
                            <div class="premium-tagline">
                                "${card.shortTagline || 'Quality service available.'}"
                            </div>
                            <button onclick="window.open('${card.slug}.html', '_blank')" class="premium-action-btn">
                                <i class="fa-solid fa-folder-open"></i> Explore Business & Contact
                            </button>
                        </div>
                    </div>`;
            });
        }

        function searchFilter() {
            let val = document.getElementById('search-input').value.toLowerCase();
            let cards = document.getElementById('directory-listings').children;
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = cards[i].innerText.toLowerCase().includes(val) ? '' : 'none';
            }
        }

        // Initial render
        renderFilterHubTabs();
        renderCards();
    </script>
</body>
</html>
