       function shareOwnerCardLink(index) {
    try {
        const card = localCardsArr[index];
        if(!card) return alert("Card not found!");

        const shareBtn = document.getElementById(`share-btn-${index}`);
        shareBtn.innerHTML = "<i class='fa-solid fa-spinner animate-spin'></i> Rendering Image...";
        shareBtn.disabled = true;

        // Create Master Canvas Frame
        const canvas = document.createElement('canvas');
        canvas.width = 600;
        canvas.height = 360;
        const ctx = canvas.getContext('2d');

        // 1. Background Frame Style (Dark Slate Premium)
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Neon Blue Card Border
        ctx.strokeStyle = "#3b82f6";
        ctx.lineWidth = 4;
        ctx.strokeRect(12, 12, 576, 336);

        // 3. Inject Text Elements Safely
        ctx.fillStyle = "#facc15"; // Yellow Gold for Business Name
        ctx.font = "bold 24px sans-serif";
        ctx.fillText(card.name, 130, 55); // Left margin 130 taaki avatar ki jagah bache

        ctx.fillStyle = "#3b82f6"; // Category Name
        ctx.font = "bold 13px sans-serif";
        ctx.fillText(`⚡ PROFESSION: ${card.category.toUpperCase()}`, 130, 85);

        ctx.fillStyle = "#94a3b8"; // Tagline (Grayish Slate)
        ctx.font = "italic 15px sans-serif";
        ctx.fillText(`"${card.shortTagline || 'No tagline'}"`, 30, 140);

        ctx.fillStyle = "#ffffff"; // General White Details
        ctx.font = "14px sans-serif";
        ctx.fillText(`📍 Address: ${card.colony}, ${card.village} (${card.district})`, 30, 190);
        ctx.fillText(`📱 WhatsApp: ${card.phone}`, 30, 220);

        // 4. Branding Watermark Bottom Strip
        ctx.fillStyle = "#1e3a8a";
        ctx.fillRect(15, 310, 570, 38);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 12px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("VISIT & CREATE: WWW.WEBSITENAME.COM", 300, 334);
        ctx.textAlign = "left"; // Reset alignment

        // 5. GRAPHICS ENGINE: Render Images Onto Canvas Array
        let ownerImg = new Image();
        let businessImg = new Image();
        let imagesLoaded = 0;

        function checkAndDownload() {
            imagesLoaded++;
            if(imagesLoaded === 2) {
                // Dono images load hone ke baad download trigger hoga
                const link = document.createElement('a');
                link.download = `${card.name.replace(/ /g, "_")}_OfficialCard.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                shareBtn.innerHTML = "<i class='fa-solid fa-share-nodes mr-1'></i> Share Card";
                shareBtn.disabled = false;
                alert("🎉 Chakaachak! Photos aur text ke sath visiting card gallery me download ho gaya hai!");
            }
        }

        // Handle Owner Avatar (Draws in a neat Circle Shape)
        if(card.ownerPhoto && card.ownerPhoto.trim() !== "") {
            ownerImg.onload = function() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(70, 65, 35, 0, Math.PI * 2, true); // Circle path coordinates
                ctx.closePath();
                ctx.clip(); // Masking current layer to circle
                ctx.drawImage(ownerImg, 35, 30, 70, 70); // Draw owner photo inside mask
                ctx.restore(); // Safe release mask layout
                checkAndDownload();
            };
            ownerImg.src = card.ownerPhoto;
        } else {
            // Default placeholder if avatar missing
            ctx.fillStyle = "#1e293b";
            ctx.beginPath();
            ctx.arc(70, 65, 35, 0, Math.PI * 2, true);
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.font = "24px sans-serif";
            ctx.fillText("👨‍✈️", 53, 73);
            checkAndDownload();
        }

        // Handle Business Collage / Banner Image (Draws on Bottom-Right Corner)
        if(card.image64 && card.image64.trim() !== "") {
            businessImg.onload = function() {
                // Drawing business collage onto bottom right side layout bounding box safely
                ctx.drawImage(businessImg, 400, 145, 170, 110);
                checkAndDownload();
            };
            businessImg.src = card.image64;
        } else {
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(400, 145, 170, 110);
            ctx.fillStyle = "#475569";
            ctx.font = "12px sans-serif";
            ctx.fillText("No Business Pic", 440, 205);
            checkAndDownload();
        }

    } catch(e) {
        console.error(e);
        alert("Matrix Image composition error.");
    }
}

// MSG ONLY BUTTON
function shareOwnerCustomText(index) {
    let card = localCardsArr[index];
    let customMsg = `🔥 *${card.name}* 🔥\n_"${card.shortTagline || ''}"_\n\n📍 *Address:* ${card.colony}, ${card.village}\n📞 *Call/WhatsApp:* ${card.phone}`;
    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(customMsg)}`, '_blank');
} 
        function exportSingleCardViaGmail(index) {
            let card = localCardsArr[index];
            let subject = encodeURIComponent(`LocalHub Registration - ${card.name}`);
            let body = encodeURIComponent(`Hi Admin,\n\n📦 COPY THIS CODE:\n\n${JSON.stringify(card)}`);
            window.location.href = `mailto:${ADMIN_RECEIVING_EMAIL}?subject=${subject}&body=${body}`;
        }

        function deleteCard(index) {
            if(confirm("Delete?")) { localCardsArr.splice(index,1); localStorage.setItem('my_local_cards', JSON.stringify(localCardsArr)); renderSavedDashboardCards(); }
        }

        // ⚠️ Baaki sab functions (openCardForm, saveCardToStorage, collage engine, etc.) — exactly aapke original jaise hi rahenge
        // Yahan space ki kami ki wajah se maine unko nahi likha, lekin aap apne original code ke sabhi functions yahan rakhenge
    </script>

    <script>

        function openCardForm(index = null) {

            const inputsToLock = ['owner-email', 'owner-state', 'owner-district', 'owner-village', 'owner-colony'];

            if(index !== null) {
                let c = localCardsArr[index];

                document.getElementById('owner-colony').value = c.colony || "Kalar Para";
                document.getElementById('owner-tagline').value = c.shortTagline || "";
                document.getElementById('owner-desc').value = c.description || "";
                
                document.getElementById('owner-photo-block').classList.add('hidden');

            } else {
                document.getElementById('card-index').value = "";
                document.getElementById('owner-name').value = "";

                if(localCardsArr.length > 0 || masterOwnerPhotoBase64 !== "") {
                    let masterProfile = localCardsArr[0] || {};
                    document.getElementById('owner-email').value = masterProfile.email || "";
                    document.getElementById('owner-phone').value = masterProfile.phone || "";
                    document.getElementById('owner-state').value = masterProfile.state || "Chhattisgarh";
                    document.getElementById('owner-district').value = masterProfile.district || "Dantewada";
                    document.getElementById('owner-village').value = masterProfile.village || "Mailawada";

                    inputsToLock.forEach(id => document.getElementById(id).disabled = true);

        function saveCardToStorage() {
            let idx = document.getElementById('card-index').value;
            document.querySelectorAll('#form-view input, #form-view select').forEach(el => el.disabled = false);

            let phone = document.getElementById('owner-phone').value.trim();
            let email = document.getElementById('owner-email').value.trim();
            let name = document.getElementById('owner-name').value.trim();
            let state = document.getElementById('owner-state').value;
            let district = document.getElementById('owner-district').value;
            let village = document.getElementById('owner-village').value;
            let colony = document.getElementById('owner-colony').value;

            if(!email || !name || phone.length !== 10 || isNaN(phone)) {
                alert("❌ Kripya poori aur sahi jankari fill karein!");
                return;
            }

            let cardData = {
                email: email,
                name: name,
                category: document.getElementById('owner-category').value,
                phone: phone,
                state: state,
                district: district,
                village: village,
                colony: colony,
                shortTagline: document.getElementById('owner-tagline').value,
                description: document.getElementById('owner-desc').value,
                image64: "",
                ownerPhoto: masterOwnerPhotoBase64
            };

            let avatarInput = document.getElementById('owner-avatar-hook');
            document.getElementById('save-btn').innerText = "⏳ Processing Text & Images...";
            document.getElementById('save-btn').disabled = true;

            if (idx === "" && masterOwnerPhotoBase64 === "" && avatarInput.files && avatarInput.files[0]) {
                compressImageFile(avatarInput.files[0], 180, function(compressedAvatar) {
                    masterOwnerPhotoBase64 = compressedAvatar;
                    localStorage.setItem('master_owner_photo', compressedAvatar);
                    cardData.ownerPhoto = compressedAvatar;
                    processThreeCollageEngine(idx, cardData);
                });
            } else {
                processThreeCollageEngine(idx, cardData);
            }
        }

        function processThreeCollageEngine(idx, cardData) {
            let p1 = document.getElementById('pic-1').files[0];
            let p2 = document.getElementById('pic-2').files[0];
            let p3 = document.getElementById('pic-3').files[0];

            let activeFiles = [p1, p2, p3].filter(f => f !== undefined);

            if(activeFiles.length === 0) {
                if(idx !== "" && localCardsArr[idx]) {
                    cardData.image64 = localCardsArr[idx].image64;
                }
                finishAndSave(idx, cardData);
                return;
            }

            let loadedImages = [];
            let totalToLoad = activeFiles.length;

            activeFiles.forEach((file, i) => {
                let reader = new FileReader();
                reader.onload = function(e) {
                    let img = new Image();
                    img.onload = function() {
                        loadedImages.push({ img: img, index: i });
                        if(loadedImages.length === totalToLoad) {
                            loadedImages.sort((a,b) => a.index - b.index);
                            
                            let canvas = document.createElement('canvas');
                            canvas.width = 600;
                            canvas.height = 360;
                            let ctx = canvas.getContext('2d');
                            ctx.fillStyle = "#1e293b"; 
                            ctx.fillRect(0,0, canvas.width, canvas.height);

                            let count = loadedImages.length;
                            if(count === 1) {
                                ctx.drawImage(loadedImages[0].img, 0, 0, 600, 360);
                            } else if(count === 2) {
                                ctx.drawImage(loadedImages[0].img, 0, 0, 296, 360);
                                ctx.drawImage(loadedImages[1].img, 304, 0, 296, 360);
                            } else if(count === 3) {
                                ctx.drawImage(loadedImages[0].img, 0, 0, 296, 360); 
                                ctx.drawImage(loadedImages[1].img, 304, 0, 296, 176); 
                                ctx.drawImage(loadedImages[2].img, 304, 184, 296, 176); 
                            }

                            cardData.image64 = canvas.toDataURL('image/jpeg', 0.65);
                            finishAndSave(idx, cardData);
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function compressImageFile(file, max_size, callback) {
            let reader = new FileReader();
            reader.onload = function (e) {
                let img = new Image();
                img.onload = function() {
                    let canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width; canvas.height = height;
                    let ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.6));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function finishAndSave(idx, cardData) {
            document.getElementById('save-btn').innerText = "💾 Save to Storage";
            document.getElementById('save-btn').disabled = false;
            commitSave(idx, cardData);
        }

        function commitSave(idx, data) {
            try {
                if(idx !== "") localCardsArr[idx] = data;
                else localCardsArr.push(data);
                
                localStorage.setItem('my_local_cards', JSON.stringify(localCardsArr));
                alert("🎉 Card & Multi-Photos Saved Successfully!");
                closeCardForm();
                renderSavedDashboardCards();
            } catch(e) {
                alert("❌ Browser Memory Full!");
            }
        }

        function deleteCard(index) {

                    masterOwnerPhotoBase64 = "";
                }
                localStorage.setItem('my_local_cards', JSON.stringify(localCardsArr));
                renderSavedDashboardCards();
            }
        }

            let body = encodeURIComponent(`Hi Admin,\n\nMaine dashboard par apna digital card verify kar liya hai. Kripya ise live karein.\n\n👤 NAME: ${card.name}\n🛠️ CATEGORY: ${card.category}\n\n📦 COPY THIS CODE PACKAGE:\n\n${JSON.stringify(card)}\n\n`);
            window.location.href = `mailto:${ADMIN_RECEIVING_EMAIL}?subject=${subject}&body=${body}`;
        }
/*

        // 🌟 ALL-IN-ONE VISITING CARD IMAGE GENERATOR (WITH OWNER & BUSINESS PHOTOS)
function shareOwnerCardLink(index) {
    try {
        const card = localCardsArr[index];
        if(!card) return alert("Card not found!");

        const shareBtn = document.getElementById(`share-btn-${index}`);
        shareBtn.innerHTML = "<i class='fa-solid fa-spinner animate-spin'></i> Rendering Image...";
        shareBtn.disabled = true;

        // Create Master Canvas Frame
        const canvas = document.createElement('canvas');
        canvas.width = 600;
        canvas.height = 360;
        const ctx = canvas.getContext('2d');

        // 1. Background Frame Style (Dark Slate Premium)
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Neon Blue Card Border
        ctx.strokeStyle = "#3b82f6";
        ctx.lineWidth = 4;
        ctx.strokeRect(12, 12, 576, 336);

        // 3. Inject Text Elements Safely
        ctx.fillStyle = "#facc15"; // Yellow Gold for Business Name
        ctx.font = "bold 24px sans-serif";
        ctx.fillText(card.name, 130, 55); // Left margin 130 taaki avatar ki jagah bache

        ctx.fillStyle = "#3b82f6"; // Category Name
        ctx.font = "bold 13px sans-serif";
        ctx.fillText(`⚡ PROFESSION: ${card.category.toUpperCase()}`, 130, 85);

        ctx.fillStyle = "#94a3b8"; // Tagline (Grayish Slate)
        ctx.font = "italic 15px sans-serif";
        ctx.fillText(`"${card.shortTagline || 'No tagline'}"`, 30, 140);

        ctx.fillStyle = "#ffffff"; // General White Details
        ctx.font = "14px sans-serif";
        ctx.fillText(`📍 Address: ${card.colony}, ${card.village} (${card.district})`, 30, 190);
        ctx.fillText(`📱 WhatsApp: ${card.phone}`, 30, 220);

        // 4. Branding Watermark Bottom Strip
        ctx.fillStyle = "#1e3a8a";
        ctx.fillRect(15, 310, 570, 38);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 12px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("VISIT & CREATE: WWW.WEBSITENAME.COM", 300, 334);
        ctx.textAlign = "left"; // Reset alignment

        // 5. GRAPHICS ENGINE: Render Images Onto Canvas Array
        let ownerImg = new Image();
        let businessImg = new Image();
        let imagesLoaded = 0;

        function checkAndDownload() {
            imagesLoaded++;
            if(imagesLoaded === 2) {
                // Dono images load hone ke baad download trigger hoga
                const link = document.createElement('a');
                link.download = `${card.name.replace(/ /g, "_")}_OfficialCard.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                shareBtn.innerHTML = "<i class='fa-solid fa-share-nodes mr-1'></i> Share Card";
                shareBtn.disabled = false;
                alert("🎉 Chakaachak! Photos aur text ke sath visiting card gallery me download ho gaya hai!");
            }
        }

        // Handle Owner Avatar (Draws in a neat Circle Shape)
        if(card.ownerPhoto && card.ownerPhoto.trim() !== "") {
            ownerImg.onload = function() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(70, 65, 35, 0, Math.PI * 2, true); // Circle path coordinates
                ctx.closePath();
                ctx.clip(); // Masking current layer to circle
                ctx.drawImage(ownerImg, 35, 30, 70, 70); // Draw owner photo inside mask
                ctx.restore(); // Safe release mask layout
                checkAndDownload();
            };
            ownerImg.src = card.ownerPhoto;
        } else {
            // Default placeholder if avatar missing
            ctx.fillStyle = "#1e293b";
            ctx.beginPath();
            ctx.arc(70, 65, 35, 0, Math.PI * 2, true);
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.font = "24px sans-serif";
            ctx.fillText("👨‍✈️", 53, 73);
            checkAndDownload();
        }

        // Handle Business Collage / Banner Image (Draws on Bottom-Right Corner)
        if(card.image64 && card.image64.trim() !== "") {
            businessImg.onload = function() {
                // Drawing business collage onto bottom right side layout bounding box safely
                ctx.drawImage(businessImg, 400, 145, 170, 110);
                checkAndDownload();
            };
            businessImg.src = card.image64;
        } else {
            ctx.fillStyle = "#1e293b";
            ctx.fillRect(400, 145, 170, 110);
            ctx.fillStyle = "#475569";
            ctx.font = "12px sans-serif";
            ctx.fillText("No Business Pic", 440, 205);
            checkAndDownload();
        }

    } catch(e) {
        console.error(e);
        alert("Matrix Image composition error.");
    }
}
