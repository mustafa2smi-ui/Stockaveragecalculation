<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GaadiBooking - Local Fleet & Tour Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-10">

    <!-- --- HEADER BAR --- -->
    <header class="bg-blue-600 text-white px-3 py-3 sticky top-0 z-50 shadow flex justify-between items-center flex-wrap gap-2">
        <h1 class="text-lg font-black tracking-wide cursor-pointer" onclick="showPage('home-page')"><i class="fa-solid fa-car-side mr-1"></i>GaadiBooking</h1>
        <div class="flex gap-1.5">
            <button onclick="alert('📢 Special Live Offer: Shadi ki booking par 10% direct discount! Malik se direct baat karein.')" class="bg-orange-500 hover:bg-orange-600 text-white font-bold px-2.5 py-1 rounded-lg text-xs animate-pulse">
                <i class="fa-solid fa-bullhorn mr-1"></i> Offer Announced
            </button>
            <button onclick="showPage('login-page')" class="bg-yellow-400 hover:bg-yellow-500 text-blue-950 font-bold px-2.5 py-1 rounded-lg text-xs">
                <i class="fa-solid fa-user-gear"></i> Owner Panel
            </button>
        </div>
    </header>

    <!-- ================= HOMEPAGE SECTION ================= -->
    <section id="home-page" class="page-section">
        <!-- Banner Alert Line (Custom Demand) -->
        <div class="bg-yellow-100 border-b border-yellow-200 text-yellow-950 text-center py-2 px-4 text-xs font-bold">
            💡 <span class="underline">Direct contact karke aap booking fare ko kam ya discount kara sakte hain!</span>
        </div>

        <div class="bg-blue-600 text-white px-4 pt-2 pb-5 rounded-b-xl shadow-inner">
            <input type="text" id="search-input" placeholder="Search Village, Tour Package, Bus, Scorpio..." class="w-full bg-white text-gray-900 px-4 py-2.5 rounded-xl shadow focus:outline-none text-sm">
        </div>

        <!-- Horizontal Filter Buttons -->
        <div class="px-4 my-3 flex gap-2 overflow-x-auto">
            <button class="bg-blue-600 text-white px-3 py-1 rounded-full text-xs font-semibold whitespace-nowrap">All Listings</button>
            <button class="bg-white border px-3 py-1 rounded-full text-xs text-gray-600 whitespace-nowrap">Tour Packages</button>
            <button class="bg-white border px-3 py-1 rounded-full text-xs text-gray-600 whitespace-nowrap">Mailawada</button>
        </div>

        <!-- Main Listings Container -->
        <div class="px-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="homepage-grid">
            <!-- Dynamic Inject -->
        </div>
    </section>

    <!-- ================= OWNER REGISTER (STEP 1) ================= -->
    <section id="login-page" class="page-section hidden max-w-md mx-auto px-4 mt-4">
        <div class="bg-white p-5 rounded-xl shadow border">
            <h2 class="font-bold text-gray-800 mb-3"><i class="fa-solid fa-id-card text-blue-600 mr-1"></i> Master Owner Setup</h2>
            <form onsubmit="saveMaster(event)" class="space-y-3">
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-0.5">Your Name (Malik Ka Naam)</label>
                    <input type="text" id="owner-name" required class="w-full border rounded-lg px-3 py-1.5 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-0.5">Main Mobile Number</label>
                    <input type="tel" id="owner-phone" required class="w-full border rounded-lg px-3 py-1.5 text-sm">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded-xl text-xs">Login Workspace</button>
            </form>
        </div>
    </section>

    <!-- ================= DASHBOARD CHOOSE PANEL ================= -->
    <section id="choice-page" class="page-section hidden max-w-md mx-auto px-4 mt-4">
        <div class="grid grid-cols-2 gap-3">
            <button onclick="showPage('add-vehicle-page')" class="bg-white border p-4 rounded-xl shadow text-center"><i class="fa-solid fa-car text-xl block text-blue-600 mb-1"></i> Add Vehicle</button>
            <button onclick="showPage('add-tour-page')" class="bg-white border p-4 rounded-xl shadow text-center"><i class="fa-solid fa-map-location-dot text-xl block text-emerald-600 mb-1"></i> Add Tour Package</button>
            <button onclick="showPage('add-driver-page')" class="bg-white border p-4 rounded-xl shadow text-center col-span-2"><i class="fa-solid fa-users-gear text-xl block text-amber-600 mb-1"></i> Manage Multiple Drivers (Saved List)</button>
        </div>
        <button onclick="showPage('home-page')" class="w-full mt-4 bg-gray-200 text-gray-700 py-1.5 rounded-lg text-xs font-bold">Finish & Go Live</button>
    </section>

    <!-- ================= ADD VEHICLE ENTRY FORM ================= -->
    <section id="add-vehicle-page" class="page-section hidden max-w-md mx-auto px-4 mt-4">
        <div class="bg-white p-5 rounded-xl shadow border space-y-3">
            <h3 class="font-bold text-gray-800 border-b pb-1">🚗 Add New Vehicle</h3>
            <form onsubmit="saveVehicle(event)" class="space-y-2.5">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="v-title" placeholder="Vehicle Name (e.g Scorpio)" required class="border rounded p-2 text-xs w-full">
                    <input type="text" id="v-service" placeholder="Service Type (e.g Wedding)" required class="border rounded p-2 text-xs w-full">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="v-route" placeholder="Route (e.g Mailawada to Dantewada)" required class="border rounded p-2 text-xs w-full">
                    <input type="text" id="v-fare" placeholder="Fare Rate (e.g ₹2,500)" required class="border rounded p-2 text-xs w-full">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg text-xs">Save Vehicle</button>
            </form>
            <button onclick="showPage('choice-page')" class="text-xs text-gray-400 block mx-auto pt-1">Back to Panel</button>
        </div>
    </section>

    <!-- ================= ADD TOUR PACKAGE FORM ================= -->
    <section id="add-tour-page" class="page-section hidden max-w-md mx-auto px-4 mt-4">
        <div class="bg-white p-5 rounded-xl shadow border space-y-3">
            <h3 class="font-bold text-gray-800 border-b pb-1">🗺️ Add Tour Package Details</h3>
            <form onsubmit="saveTour(event)" class="space-y-2.5">
                <input type="text" id="t-name" placeholder="Tour Package Name (e.g Tirth Yatra Special)" required class="border rounded p-2 text-xs w-full">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="t-vtype" placeholder="Vehicle Type (e.g Bus/Scorpio)" required class="border rounded p-2 text-xs w-full">
                    <input type="number" id="t-seat" placeholder="Total Seats (e.g 7)" required class="border rounded p-2 text-xs w-full">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="t-fromto" placeholder="From - To Location" required class="border rounded p-2 text-xs w-full">
                    <input type="text" id="t-days" placeholder="Duration (e.g 3 Days / 2 Nights)" required class="border rounded p-2 text-xs w-full">
                </div>
                <input type="text" id="t-cost" placeholder="Package Fixed Price (e.g ₹15,000)" required class="border rounded p-2 text-xs w-full">
                <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-2 rounded-lg text-xs">Publish Tour Package</button>
            </form>
            <button onclick="showPage('choice-page')" class="text-xs text-gray-400 block mx-auto pt-1">Back to Panel</button>
        </div>
    </section>

    <!-- ================= MULTIPLE DRIVER REGISTRY FORM ================= -->
    <section id="add-driver-page" class="page-section hidden max-w-md mx-auto px-4 mt-4">
        <div class="bg-white p-5 rounded-xl shadow border space-y-3">
            <h3 class="font-bold text-gray-800 border-b pb-1">👷 Register Multiple Drivers</h3>
            <form onsubmit="saveDriver(event)" class="space-y-2">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="d-name" placeholder="Driver Full Name" required class="border rounded p-2 text-xs w-full">
                    <input type="tel" id="d-phone" placeholder="Driver Mobile No" required class="border rounded p-2 text-xs w-full">
                </div>
                <button type="submit" class="w-full bg-amber-600 text-white font-bold py-1.5 rounded-lg text-xs">+ Save/Add Driver into List</button>
            </form>

            <div class="mt-3">
                <p class="text-xs font-bold text-gray-600 mb-1">Saved Fleet Drivers:</p>
                <div id="drivers-list-box" class="space-y-1 max-h-32 overflow-y-auto text-xs">
                    <!-- Added drivers show here -->
                </div>
            </div>
            <button onclick="showPage('choice-page')" class="text-xs text-gray-400 block mx-auto pt-2">Back to Panel</button>
        </div>
    </section>

    <!-- --- CORE LOGIC JS --- -->
    <script>
        let ownerData = JSON.parse(localStorage.getItem('m_owner')) || { name: "Suresh", phone: "9827155555" };
        let localVehicles = JSON.parse(localStorage.getItem('m_vehicles')) || [];
        let localTours = JSON.parse(localStorage.getItem('m_tours')) || [];
        let localDrivers = JSON.parse(localStorage.getItem('m_drivers')) || [];

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function saveMaster(e) {
            e.preventDefault();
            ownerData = {
                name: document.getElementById('owner-name').value,
                phone: document.getElementById('owner-phone').value
            };
            localStorage.setItem('m_owner', JSON.stringify(ownerData));
            showPage('choice-page');
        }

        function saveVehicle(e) {
            e.preventDefault();
            localVehicles.push({
                title: document.getElementById('v-title').value,
                service: document.getElementById('v-service').value,
                route: document.getElementById('v-route').value,
                fare: document.getElementById('v-fare').value
            });
            localStorage.setItem('m_vehicles', JSON.stringify(localVehicles));
            alert("Vehicle Added!");
            renderHomeListings();
            showPage('choice-page');
        }

        function saveTour(e) {
            e.preventDefault();
            localTours.push({
                name: document.getElementById('t-name').value,
                vtype: document.getElementById('t-vtype').value,
                seat: document.getElementById('t-seat').value,
                fromto: document.getElementById('t-fromto').value,
                days: document.getElementById('t-days').value,
                cost: document.getElementById('t-cost').value
            });
            localStorage.setItem('m_tours', JSON.stringify(localTours));
            alert("Tour Package Added!");
            renderHomeListings();
            showPage('choice-page');
        }

        function saveDriver(e) {
            e.preventDefault();
            localDrivers.push({
                name: document.getElementById('d-name').value,
                phone: document.getElementById('d-phone').value
            });
            localStorage.setItem('m_drivers', JSON.stringify(localDrivers));
            renderDriversList();
            document.getElementById('d-name').value = '';
            document.getElementById('d-phone').value = '';
        }

        function renderDriversList() {
            const box = document.getElementById('drivers-list-box');
            box.innerHTML = localDrivers.length === 0 ? '<p class="text-gray-400">No driver saved.</p>' : '';
            localDrivers.forEach(d => {
                box.innerHTML += `<div class="bg-gray-100 p-1.5 rounded flex justify-between"><span>👨‍✈️ ${d.name}</span> <span class="text-gray-400">(${d.phone.replace(/.(?=.{4})/g, "X")})</span></div>`;
            });
        }

        function showDriversAlert() {
            if(localDrivers.length === 0) {
                alert("Owner has trusted local drivers available.");
                return;
            }
            let driverNames = localDrivers.map(d => "• " + d.name).join("\n");
            alert("👨‍✈️ Connected Fleet Drivers List:\n\n" + driverNames + "\n\n(Note: Numbers are locked for safety. Contact Owner directly to assign.)");
        }

        function renderHomeListings() {
            const grid = document.getElementById('homepage-grid');
            grid.innerHTML = '';

            // Render Standard Vehicles
            localVehicles.forEach(v => {
                grid.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 space-y-2">
                        <div class="flex justify-between text-xs"><span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded font-bold">${v.service}</span><span class="text-gray-400">📍 Mailawada Hub</span></div>
                        <h4 class="font-bold text-sm text-gray-900">${v.title}</h4>
                        <div class="bg-gray-50 p-2 rounded text-xs border border-dashed flex justify-between"><span>🛣️ ${v.route}</span> <span class="font-bold text-blue-600">${v.fare}</span></div>
                        <div class="flex justify-between items-center pt-1 border-t">
                            <button onclick="showDriversAlert()" class="text-[11px] text-amber-700 bg-amber-50 px-2 py-0.5 rounded font-medium"><i class="fa-solid fa-users"></i> Drivers Info</button>
                            <a href="https://wa.me/${ownerData.phone}" target="_blank" class="bg-emerald-500 text-white font-bold px-3 py-1 rounded text-xs"><i class="fa-brands fa-whatsapp"></i> Book Now</a>
                        </div>
                    </div>`;
            });

            // Render Tour Packages
            localTours.forEach(t => {
                grid.innerHTML += `
                    <div class="bg-gradient-to-br from-emerald-50 to-white p-4 rounded-xl shadow-sm border border-emerald-100 space-y-2">
                        <div class="flex justify-between text-xs"><span class="bg-emerald-600 text-white px-2 py-0.5 rounded font-bold">🎯 Tour Package</span><span class="text-gray-500 font-medium">⏳ ${t.days}</span></div>
                        <h4 class="font-black text-sm text-emerald-950">${t.name}</h4>
                        <p class="text-[11px] text-gray-600">🚌 <b>Vehicle:</b> ${t.vtype} (${t.seat} Seater) | 🗺️ <b>Route:</b> ${t.fromto}</p>
                        <div class="flex justify-between items-center pt-2 border-t border-emerald-100">
                            <span class="font-extrabold text-sm text-emerald-700">${t.cost}</span>
                            <a href="https://wa.me/${ownerData.phone}" target="_blank" class="bg-emerald-600 text-white font-bold px-3 py-1 rounded text-xs"><i class="fa-brands fa-whatsapp"></i> Book Package</a>
                        </div>
                    </div>`;
            });

            if(localVehicles.length === 0 && localTours.length === 0) {
                grid.innerHTML = '<p class="text-center text-gray-400 py-6 text-xs col-span-full">No active vehicle or package found. Open panel to create data.</p>';
            }
        }

        // Boot Init
        renderHomeListings();
        renderDriversList();
    </script>
</body>
</html>
